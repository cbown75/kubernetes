apiVersion: batch/v1
kind: CronJob
metadata:
  name: apps-postgres-backup
  namespace: databases
spec:
  schedule: "0 2 * * *"
  timeZone: America/Denver
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 26
            runAsGroup: 26
            fsGroup: 26
          containers:
            - name: pgdump
              # Same image as the cluster so pg_dumpall matches the server version.
              image: ghcr.io/cloudnative-pg/postgresql:16.14
              imagePullPolicy: IfNotPresent
              env:
                - name: PGHOST
                  value: apps-postgres-rw
                - name: PGUSER
                  value: postgres
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: apps-postgres-superuser
                      key: password
                - name: RETENTION_DAYS
                  value: "14"
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  probe="/backups/.write-probe-$$"
                  if ! touch "${probe}" 2>/dev/null; then
                    echo "FATAL: /backups not writable by uid $(id -u) — check nfs-holocron-databases export squash" >&2
                    exit 1
                  fi
                  rm -f "${probe}"

                  ts=$(date +%Y%m%d-%H%M%S)
                  out="/backups/apps-postgres-${ts}.sql.gz"
                  tmp="${out}.tmp"
                  # Write to a temp file and only promote it after the gzip stream
                  # verifies, so a failed dump can't masquerade as a valid backup.
                  trap 'rm -f "${tmp}"' EXIT
                  echo "Dumping all databases from ${PGHOST} to ${out}"
                  pg_dumpall --clean --if-exists | gzip > "${tmp}"
                  gzip -t "${tmp}"
                  mv "${tmp}" "${out}"
                  trap - EXIT
                  echo "Backup complete: $(du -h "${out}" | cut -f1)"
                  echo "Pruning dumps older than ${RETENTION_DAYS} days"
                  find /backups -maxdepth 1 -name 'apps-postgres-*.sql.gz' -mtime "+${RETENTION_DAYS}" -print -delete
                  echo "Current backups:"
                  ls -lh /backups
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 512Mi
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: apps-postgres-backups
